<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="50" cy="50" r="45" fill="url(#bgGrad)"/>
  
  <!-- Medical cross -->
  <rect x="42" y="25" width="16" height="50" rx="3" fill="white" opacity="0.95"/>
  <rect x="25" y="42" width="50" height="16" rx="3" fill="white" opacity="0.95"/>
  
  <!-- U letter -->
  <text x="50" y="62" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#3b82f6" text-anchor="middle">U</text>
  
  <!-- Chart line -->
  <polyline points="30,70 40,60 50,65 60,50 70,55" fill="none" stroke="#10b981" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
</svg>

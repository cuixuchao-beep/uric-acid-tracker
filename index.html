<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="尿酸指数记录 - 每日尿酸数值追踪与管理">
    <meta name="theme-color" content="#3b82f6">
    <title>尿酸指数记录 | Uric Acid Tracker</title>
    <link rel="icon" type="image/svg+xml" href="assets/icon.svg">
    <link rel="apple-touch-icon" href="assets/icon-192.png">
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="app-container">
        <!-- Header -->
        <header class="header">
            <h1>📊 尿酸指数记录</h1>
            <p class="subtitle">Uric Acid Tracker</p>
        </header>

        <!-- Unit Toggle -->
        <div class="unit-toggle">
            <label>单位切换：</label>
            <div class="toggle-group">
                <button class="toggle-btn active" data-unit="mgdl" onclick="setUnit('mgdl')">mg/dL</button>
                <button class="toggle-btn" data-unit="umol" onclick="setUnit('umol')">μmol/L</button>
            </div>
        </div>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Input Section -->
            <section class="card input-section">
                <h2>📝 记录尿酸值</h2>
                <form id="recordForm" onsubmit="saveRecord(event)">
                    <div class="form-group">
                        <label for="recordDate">日期</label>
                        <input type="date" id="recordDate" required>
                    </div>
                    <div class="form-group">
                        <label for="recordTime">时间（可选）</label>
                        <input type="time" id="recordTime">
                    </div>
                    <div class="form-group">
                        <label for="uricValue">尿酸值 <span class="unit-label">(mg/dL)</span></label>
                        <input type="number" id="uricValue" step="0.1" min="0" max="1000" placeholder="例如: 5.5" required>
                    </div>
                    <div class="form-group">
                        <label for="notes">备注（可选）</label>
                        <textarea id="notes" rows="2" placeholder="例如: 饮食记录、用药情况等"></textarea>
                    </div>
                    <button type="submit" class="btn-primary">💾 保存记录</button>
                </form>
            </section>

            <!-- Statistics Section -->
            <section class="card stats-section">
                <h2>📈 数据统计</h2>
                <div class="stats-grid">
                    <div class="stat-item">
                        <span class="stat-label">最新记录</span>
                        <span class="stat-value" id="latestValue">--</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-label">7日平均</span>
                        <span class="stat-value" id="avg7days">--</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-label">30日平均</span>
                        <span class="stat-value" id="avg30days">--</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-label">总记录数</span>
                        <span class="stat-value" id="totalRecords">0</span>
                    </div>
                </div>
                <div class="reference-range">
                    <p>📚 参考范围：</p>
                    <p>男性：3.4-7.0 mg/dL (202-416 μmol/L)</p>
                    <p>女性：2.4-6.0 mg/dL (143-357 μmol/L)</p>
                </div>
            </section>

            <!-- Chart Section -->
            <section class="card chart-section">
                <h2>📉 趋势图表</h2>
                <div class="chart-controls">
                    <button class="btn-secondary active" onclick="setChartRange(7)">7天</button>
                    <button class="btn-secondary" onclick="setChartRange(30)">30天</button>
                    <button class="btn-secondary" onclick="setChartRange(90)">90天</button>
                    <button class="btn-secondary" onclick="setChartRange(0)">全部</button>
                </div>
                <div class="chart-container">
                    <canvas id="trendChart"></canvas>
                </div>
            </section>

            <!-- History Section -->
            <section class="card history-section">
                <h2>📋 历史记录</h2>
                <div class="history-controls">
                    <input type="text" id="searchNotes" placeholder="🔍 搜索备注..." oninput="filterHistory()">
                    <select id="historySort" onchange="renderHistory()">
                        <option value="desc">最新优先</option>
                        <option value="asc">最早优先</option>
                    </select>
                </div>
                <div class="history-list" id="historyList">
                    <!-- Records will be rendered here -->
                </div>
                <div class="load-more" id="loadMore" style="display: none;">
                    <button class="btn-secondary" onclick="loadMoreHistory()">加载更多</button>
                </div>
            </section>
        </main>

        <!-- Export Section -->
        <section class="card export-section">
            <h2>📤 数据导出</h2>
            <div class="export-buttons">
                <button class="btn-export" onclick="exportData('csv')">
                    📄 导出 CSV
                </button>
                <button class="btn-export" onclick="exportData('json')">
                    📋 导出 JSON
                </button>
                <button class="btn-export btn-danger" onclick="confirmClearData()">
                    🗑️ 清除数据
                </button>
            </div>
        </section>

        <!-- Footer -->
        <footer class="footer">
            <p>💡 数据存储在本地浏览器中，不会上传至服务器</p>
            <p>© 2024 Uric Acid Tracker | <a href="https://github.com" target="_blank">GitHub</a></p>
        </footer>
    </div>

    <!-- Modal -->
    <div class="modal" id="modal">
        <div class="modal-content">
            <h3 id="modalTitle">提示</h3>
            <p id="modalMessage"></p>
            <div class="modal-buttons">
                <button class="btn-secondary" onclick="closeModal()">取消</button>
                <button class="btn-danger" id="modalConfirm">确认</button>
            </div>
        </div>
    </div>

    <!-- Toast Notification -->
    <div class="toast" id="toast"></div>

    <!-- Chart.js CDN -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
